pt\u003cbr\u003ename: Eine Situation kann traumatisch wirken, wenn eine Person einer schwerwiegenden Bedrohung ausgesetzt ist und gleichzeitig erlebt, dass Kampf- oder Fluchtversuche ins Leere laufen. Entscheidend ist nicht nur das objektive Ereignis selbst, sondern ob die Situation die subjektiv verf\u00fcgbaren Bew\u00e4ltigungsm\u00f6glichkeiten deutlich \u00fcbersteigt und in der Folge Gef\u00fchle von, Hilflosigkeit oder Ausgeliefertsein ausl\u00f6st. Das Erlebte kann dadurch das Vertrauen in Sicherheit, in andere Menschen oder in die eigene Handlungsf\u00e4higkeit nachhaltig ersch\u00fcttern, und so das komplette Selbst- und Weltverst\u00e4ndnis ver\u00e4ndern. Ob ein traumatisches Ereignis tats\u00e4chlich zu einem psychischen Traumatisierung f\u00fchrt, bzw, ob oder wie gut man sich erholt h\u00e4ngt auch von der pers\u00f6nlichen Lebensgeschichte und Schutzfaktoren, wie Sicherheit und Vorhersehbarkeit spendenden sozialen Beziehungen und Lebensumst\u00e4nden vor und nach dem Schockerlebnis der traumatischen Situation ab. \u201d\u003cbr\u003efrequency: 1\u003cbr\u003emodules: 1\u003cbr\u003ephase_mode: Antecedent\u003cbr\u003ecompetence_mode: knowledge\u003cbr\u003egranularity_mode: high","\u003cb\u003eEine einfache Atem\u00fcbung\u003c\u002fb\u003e\u003cbr\u003etype: Concept\u003cbr\u003ename: Eine einfache Atem\u00fcbung\u003cbr\u003efrequency: 1\u003cbr\u003emodules: 1\u003cbr\u003ephase_mode: \u003cbr\u003ecompetence_mode: skill\u003cbr\u003egranularity_mode: low","\u003cb\u003eEine hilfreiche Beratung f\u00e4ngt bei uns selbst an!\u003c\u002fb\u003e\u003cbr\u003etype: Concept\u003cbr\u003ename: Eine hilfreiche Beratung f\u00e4ngt bei uns selbst an!\u003cbr\u003efrequency: 1\u003cbr\u003emodules: 1\u003cbr\u003ephase_mode: Coping & Consequences\u003cbr\u003ecompetence_mode: attitude\u003cbr\u003egranularity_mode: middle","\u003cb\u003eEine typische \u00c4u\u00dferung\u003c\u002fb\u003e\u003cbr\u003etype: Concept\u003cbr\u003ename: Eine typische \u00c4u\u0
